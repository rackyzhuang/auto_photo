name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "发布版本号，例如 v0.1.0"
        required: true
        type: string

permissions:
  contents: write

env:
  NODE_VERSION: "20"

jobs:
  build-release:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            target: ""
            args: --bundles msi,nsis
          - name: macOS Apple Silicon
            os: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --bundles app,dmg

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set release version
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        if: matrix.target != ''
        run: rustup target add ${{ matrix.target }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build and upload release artifacts
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ steps.release.outputs.version }}
          releaseName: AutoPhoto ${{ steps.release.outputs.version }}
          releaseBody: AutoPhoto 桌面版与移动端构建产物发布。
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  build-android:
    name: Build Android APK/AAB
    runs-on: ubuntu-latest
    needs: build-release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set release version
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          # sdkmanager exits after accepting every license, which closes the pipe
          # while `yes` is still writing. Ignore that expected SIGPIPE without
          # hiding a real sdkmanager failure.
          set +o pipefail
          yes | sdkmanager --licenses
          set -o pipefail
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0" "ndk;27.0.12077973"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> "$GITHUB_ENV"
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> "$GITHUB_ENV"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Initialize Android project
        shell: bash
        run: |
          if [ ! -d src-tauri/gen/android ]; then
            npm run mobile:android:init:ci
          fi

      - name: Build Android APK and AAB
        run: npm run mobile:android:build:release

      - name: Build Android debug APK
        run: npm run mobile:android:build:debug-apk

      - name: Collect Android artifacts
        shell: bash
        run: |
          mkdir -p mobile-artifacts/android
          find src-tauri/gen/android -type f \( -name "*.apk" -o -name "*.aab" \) -exec cp {} mobile-artifacts/android/ \;
          find mobile-artifacts/android -type f -print
          test "$(find mobile-artifacts/android -type f | wc -l)" -gt 0

      - name: Upload Android workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AutoPhoto-Android-${{ steps.release.outputs.version }}
          path: mobile-artifacts/android/*

      - name: Attach Android artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.version }}
          files: mobile-artifacts/android/*

  build-ios:
    name: Build iOS
    runs-on: macos-latest
    needs: build-release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set release version
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Initialize iOS project
        shell: bash
        run: |
          if [ ! -d src-tauri/gen/apple ]; then
            npm run mobile:ios:init:ci
          fi

      - name: Build iOS simulator app
        run: npm run mobile:ios:build:simulator

      - name: Detect iOS signing configuration
        id: ios-signing
        shell: bash
        env:
          AUTOPHOTO_IOS_CERTIFICATE: ${{ secrets.IOS_CERTIFICATE }}
          AUTOPHOTO_IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          AUTOPHOTO_IOS_MOBILE_PROVISION: ${{ secrets.IOS_MOBILE_PROVISION }}
        run: |
          if [ -n "$AUTOPHOTO_IOS_CERTIFICATE" ] && [ -n "$AUTOPHOTO_IOS_CERTIFICATE_PASSWORD" ] && [ -n "$AUTOPHOTO_IOS_MOBILE_PROVISION" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Apple signing secrets are incomplete; the simulator artifact will still be published."
          fi

      - name: Build signed iOS IPA
        if: steps.ios-signing.outputs.enabled == 'true'
        env:
          IOS_CERTIFICATE: ${{ secrets.IOS_CERTIFICATE }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_MOBILE_PROVISION: ${{ secrets.IOS_MOBILE_PROVISION }}
        run: npm run mobile:ios:build:release

      - name: Collect iOS artifacts
        shell: bash
        run: |
          mkdir -p mobile-artifacts/ios
          find src-tauri/gen/apple -type f -name "*.ipa" -exec cp {} mobile-artifacts/ios/ \;
          while IFS= read -r -d '' app; do
            ditto -c -k --keepParent "$app" "mobile-artifacts/ios/$(basename "$app").zip"
          done < <(find src-tauri/gen/apple -type d -name "*.app" -print0)
          while IFS= read -r -d '' archive; do
            ditto -c -k --keepParent "$archive" "mobile-artifacts/ios/$(basename "$archive").zip"
          done < <(find src-tauri/gen/apple -type d -name "*.xcarchive" -print0)
          find mobile-artifacts/ios -type f -print
          test "$(find mobile-artifacts/ios -type f | wc -l)" -gt 0

      - name: Upload iOS workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AutoPhoto-iOS-${{ steps.release.outputs.version }}
          path: mobile-artifacts/ios/*

      - name: Attach iOS artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.version }}
          files: mobile-artifacts/ios/*
