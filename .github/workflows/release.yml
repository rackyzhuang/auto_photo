name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "发布版本号，例如 v0.1.0"
        required: true
        type: string

permissions:
  contents: write

env:
  NODE_VERSION: "20"

jobs:
  build-release:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            target: ""
            args: --bundles msi,nsis
          - name: macOS Apple Silicon
            os: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --bundles app,dmg

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set release version
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        if: matrix.target != ''
        run: rustup target add ${{ matrix.target }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build and upload release artifacts
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ steps.release.outputs.version }}
          releaseName: AutoPhoto ${{ steps.release.outputs.version }}
          releaseBody: AutoPhoto 桌面版与移动端构建产物发布。
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: build-release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set release version
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          # sdkmanager exits after accepting every license, which closes the pipe
          # while `yes` is still writing. Ignore that expected SIGPIPE without
          # hiding a real sdkmanager failure.
          set +o pipefail
          yes | sdkmanager --licenses
          set -o pipefail
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0" "ndk;27.0.12077973"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> "$GITHUB_ENV"
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> "$GITHUB_ENV"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Initialize Android project
        shell: bash
        run: |
          if [ ! -d src-tauri/gen/android ]; then
            npm run mobile:android:init:ci
          fi

      - name: Install Android gallery integration
        shell: bash
        run: |
          set -euo pipefail
          npm run mobile:android:prepare
          test -f src-tauri/gen/android/app/src/main/java/com/autophoto/gallery/GalleryPlugin.kt

      - name: Install AutoPhoto launcher icons into Android project
        shell: bash
        run: |
          set -euo pipefail
          npm run tauri -- icon src/assets/autophoto-logo-transparent.png

          android_res="src-tauri/gen/android/app/src/main/res"
          icon_res="src-tauri/icons/android"
          test -d "$android_res"
          test -d "$icon_res"
          cp -R "$icon_res"/. "$android_res"/

          cmp "$icon_res/mipmap-xxxhdpi/ic_launcher.png" "$android_res/mipmap-xxxhdpi/ic_launcher.png"
          cmp "$icon_res/mipmap-xxxhdpi/ic_launcher_round.png" "$android_res/mipmap-xxxhdpi/ic_launcher_round.png"
          cmp "$icon_res/mipmap-xxxhdpi/ic_launcher_foreground.png" "$android_res/mipmap-xxxhdpi/ic_launcher_foreground.png"
          grep -q '@mipmap/ic_launcher' src-tauri/gen/android/app/src/main/AndroidManifest.xml

      - name: Build Android release APK
        run: npm run mobile:android:build:release

      - name: Sign Android release APK
        shell: bash
        env:
          ANDROID_KEY_BASE64: ${{ secrets.ANDROID_KEY_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          set -euo pipefail

          mkdir -p mobile-artifacts/android
          version="${{ steps.release.outputs.version }}"
          keystore="$RUNNER_TEMP/autophoto-release.jks"
          aligned_apk="$RUNNER_TEMP/autophoto-release-aligned.apk"
          signed_apk="mobile-artifacts/android/AutoPhoto_${version#v}_android.apk"
          build_tools="$ANDROID_HOME/build-tools/35.0.0"

          if [ -n "${ANDROID_KEY_BASE64:-}" ] && [ -n "${ANDROID_KEY_ALIAS:-}" ] && [ -n "${ANDROID_KEY_PASSWORD:-}" ]; then
            printf '%s' "$ANDROID_KEY_BASE64" | base64 --decode > "$keystore"
            key_alias="$ANDROID_KEY_ALIAS"
            key_password="$ANDROID_KEY_PASSWORD"
            keystore_password="${ANDROID_KEYSTORE_PASSWORD:-$ANDROID_KEY_PASSWORD}"
            echo "Using Android signing key from GitHub Secrets."
          else
            echo "::warning::Android signing secrets are incomplete; generating an install-only signing key for this build."
            key_alias="autophoto-install"
            key_password="android"
            keystore_password="android"
            keytool -genkeypair \
              -keystore "$keystore" \
              -storepass "$keystore_password" \
              -keypass "$key_password" \
              -alias "$key_alias" \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=AutoPhoto CI, OU=Install, O=AutoPhoto, L=CI, S=CI, C=US"
          fi

          release_apk="$(find src-tauri/gen/android -type f -name "*release-unsigned.apk" -print -quit)"
          if [ -z "$release_apk" ]; then
            release_apk="$(find src-tauri/gen/android -type f -name "*release*.apk" ! -name "*debug*.apk" -print -quit)"
          fi
          if [ -z "$release_apk" ]; then
            echo "::error::No Android release APK was produced."
            find src-tauri/gen/android -type f -name "*.apk" -print || true
            exit 1
          fi

          "$build_tools/zipalign" -p -f 4 "$release_apk" "$aligned_apk"
          "$build_tools/apksigner" sign \
            --ks "$keystore" \
            --ks-key-alias "$key_alias" \
            --ks-pass "pass:$keystore_password" \
            --key-pass "pass:$key_password" \
            --v4-signing-enabled false \
            --out "$signed_apk" \
            "$aligned_apk"
          "$build_tools/apksigner" verify --verbose "$signed_apk"
          rm -f "$signed_apk.idsig"

          find mobile-artifacts/android -type f -print
          test "$(find mobile-artifacts/android -type f -name "*.apk" | wc -l)" -eq 1

      - name: Upload Android workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AutoPhoto-Android-${{ steps.release.outputs.version }}
          path: mobile-artifacts/android/*.apk

      - name: Attach Android artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.version }}
          files: mobile-artifacts/android/*.apk

  build-ios:
    name: Build iOS
    runs-on: macos-latest
    needs: build-release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set release version
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Initialize iOS project
        shell: bash
        run: |
          if [ ! -d src-tauri/gen/apple ]; then
            npm run mobile:ios:init:ci
          fi

      - name: Detect iOS signing configuration
        id: ios-signing
        shell: bash
        env:
          AUTOPHOTO_IOS_CERTIFICATE: ${{ secrets.IOS_CERTIFICATE }}
          AUTOPHOTO_IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          AUTOPHOTO_IOS_MOBILE_PROVISION: ${{ secrets.IOS_MOBILE_PROVISION }}
        run: |
          if [ -n "$AUTOPHOTO_IOS_CERTIFICATE" ] && [ -n "$AUTOPHOTO_IOS_CERTIFICATE_PASSWORD" ] && [ -n "$AUTOPHOTO_IOS_MOBILE_PROVISION" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Apple signing secrets are incomplete; no iOS IPA will be published."
          fi

      - name: Build signed iOS IPA
        if: steps.ios-signing.outputs.enabled == 'true'
        env:
          IOS_CERTIFICATE: ${{ secrets.IOS_CERTIFICATE }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_MOBILE_PROVISION: ${{ secrets.IOS_MOBILE_PROVISION }}
        run: npm run mobile:ios:build:release

      - name: Collect iOS IPA
        if: steps.ios-signing.outputs.enabled == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p mobile-artifacts/ios
          version="${{ steps.release.outputs.version }}"
          ipa="$(find src-tauri/gen/apple -type f -name "*.ipa" -print -quit)"
          if [ -z "$ipa" ]; then
            echo "::error::No signed iOS IPA was produced."
            find src-tauri/gen/apple -type f -print || true
            exit 1
          fi
          cp "$ipa" "mobile-artifacts/ios/AutoPhoto_${version#v}_ios.ipa"
          find mobile-artifacts/ios -type f -print
          test "$(find mobile-artifacts/ios -type f -name "*.ipa" | wc -l)" -eq 1

      - name: Upload iOS workflow artifacts
        if: steps.ios-signing.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: AutoPhoto-iOS-${{ steps.release.outputs.version }}
          path: mobile-artifacts/ios/*

      - name: Attach iOS artifacts to release
        if: steps.ios-signing.outputs.enabled == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.version }}
          files: mobile-artifacts/ios/*
